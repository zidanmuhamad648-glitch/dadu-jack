<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JACK KB - ALL DEV Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght=400;500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0013;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Container Layar HP Mockup */
        .phone-screen {
            width: 100vw;
            height: 100vh;
            max-width: 412px;
            max-height: 892px;
            position: relative;
            overflow: hidden;
            background: #06000a;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            border-radius: 10px;
        }

        /* ANIMASI UTAMA: Kode digital ungu mengalir bergerak dari atas ke bawah */
        #matrixCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.6;
            pointer-events: none;
        }

        /* --- SCREEN SCREEN DASAR --- */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(13, 0, 19, 0.85);
            z-index: 4;
            transition: opacity 0.5s ease;
            text-align: center;
        }

        /* --- SCREEN 1: KODE AKTIVASI VIDEO --- */
        .activation-screen {
            z-index: 3;
            background: rgba(13, 0, 19, 0.85);
        }

        .upload-btn {
            background-color: transparent;
            color: #ff00ff;
            padding: 16px 20px;
            border: 2px solid #ff00ff;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
            transition: all 0.2s;
            width: 100%;
            text-align: center;
        }

        .upload-btn:hover {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 20px #ff00ff;
        }

        #file-input {
            display: none;
        }

        .preview-box {
            width: 100%;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .preview-box video {
            width: 100%;
            max-height: 250px;
            border: 2px solid #ff00ff;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }

        .status-validation {
            color: #00ffcc;
            font-size: 1.2rem;
            text-shadow: 0 0 10px #00ffcc;
            animation: blink 1s infinite;
        }

        .countdown-text {
            color: #ff00ff;
            font-size: 0.9rem;
            margin-top: -5px;
            opacity: 0.8;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* --- INTERFACE UTAMA (SCREEN 3) --- */
        .app-hacker {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(13, 0, 19, 0.6);
            z-index: 2;
        }

        .title {
            font-size: 2.4rem;
            color: #ff00ff;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #ff00ff;
            margin-top: 20px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #ff00ff;
            letter-spacing: 5px;
            opacity: 0.8;
            margin-bottom: 40px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 20px;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 16px;
            background: rgba(26, 0, 38, 0.8);
            border: 2px solid #ff00ff;
            border-radius: 14px;
            color: #fff;
            font-size: 1.1rem;
            font-family: 'Share Tech Mono', monospace;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-start {
            width: 100%;
            padding: 16px;
            background: #ff00ff;
            border: none;
            border-radius: 14px;
            color: #000;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 0 15px #ff00ff;
            margin-bottom: 25px;
            cursor: pointer;
        }

        .progress-container {
            width: 100%;
            height: 20px;
            background: #1a0026;
            border: 2px solid #ff00ff;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
            transition: width 0.3s ease-out;
        }

        .console-box {
            width: 100%;
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ff00ff;
            border-radius: 14px;
            padding: 15px;
            text-align: left;
            font-size: 0.95rem;
            overflow-y: auto;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .log-line {
            color: #ff00ff;
            margin-bottom: 8px;
        }

        .success-text {
            color: #00ffcc !important;
            text-shadow: 0 0 8px #00ffcc;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="phone-screen">
        <canvas id="matrixCanvas"></canvas>
        
        <div class="screen" id="keyScreen">
            <div class="title" style="margin-bottom: 30px; font-size: 2rem;">SECURITY ACCESS</div>
            <div class="form-group">
                <input type="text" id="inputPhone" placeholder="MASUKKAN NOMOR HP">
            </div>
            <div class="form-group">
                <input type="text" id="inputKey" placeholder="MASUKKAN ACCESS KEY">
            </div>
            <button class="btn-start" onclick="validasiKeyGitHub()">VERIFY ACCESS</button>
        </div>

        <div class="screen activation-screen hidden" id="activationScreen">
            <div class="title" style="margin-bottom: 30px; font-size: 2rem;">INITIALIZE SCRIPT</div>
            
            <label for="file-input" class="upload-btn" id="uploadLabel">📹 MASUKAN VIDEO UNTUK MULAI</label>
            <input type="file" id="file-input" accept="video/*">

            <div class="preview-box hidden" id="previewBox"></div>
        </div>

        <div class="app-hacker" id="appHacker">
            <div class="title">JACK X FIS KB</div>
            <div class="subtitle">NEON HACKER SYSTEM</div>

            <div class="form-group">
                <select id="modeField">
                    <option value="K">K</option>
                    <option value="B">B</option>
                    <option value="PILIH MODE" selected>PILIH MODE</option>
                </select>
            </div>

            <div class="form-group">
                <input type="text" id="hpField" placeholder="MASUKAN TIPE HP">
            </div>

            <button class="btn-start" id="btnStart" onclick="mulaiHacking()">START SETTING</button>

            <div class="progress-container" id="progCont">
                <div class="progress-bar" id="progBar"></div>
            </div>

            <div class="console-box" id="consBox"></div>
        </div>
    </div>

    <script>
        // --- Link Raw GitHub kamu ---
        const GITHUB_DATABASE_URL = "https://raw.githubusercontent.com/zidanmuhamad648-glitch/dadu-jack/refs/heads/main/keys.json";

        // --- 1. PROSES BACKGROUND DIGITAL MATRIX RAIN ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 412;
        canvas.height = 892;

        const matrixChars = "01SHINZUKB97X84B1K2M03";
        const charArr = matrixChars.split("");
        const fontSize = 14;
        const columns = canvas.width / fontSize; 

        const rainDrops = [];
        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(13, 0, 19, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff00ff'; 
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = charArr[Math.floor(Math.random() * charArr.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);


        // --- 2. LOGIKA VALIDASI KEY DARI GITHUB ---
        async function validasiKeyGitHub() {
            const phone = document.getElementById('inputPhone').value.trim();
            const key = document.getElementById('inputKey').value.trim();

            if (phone === "" || key === "") {
                alert("Nomor HP dan Key tidak boleh kosong!");
                return;
            }

            try {
                const response = await fetch(GITHUB_DATABASE_URL);
                const dbKeys = await response.json();

                if (dbKeys[key]) {
                    const dataKey = dbKeys[key];

                    if (dataKey.status === "used" && dataKey.used_by !== phone) {
                        alert("AKSES DITOLAK: Key ini sudah dipakai oleh nomor HP lain!");
                    } else {
                        alert("AKSES DITERIMA! Silakan lakukan aktivasi video.");
                        document.getElementById('keyScreen').classList.add('hidden');
                        document.getElementById('activationScreen').classList.remove('hidden');
                    }
                } else {
                    alert("AKSES GAGAL: Key salah atau tidak terdaftar!");
                }
            } catch (err) {
                console.error(err);
                alert("Gagal terhubung ke database GitHub. Pastikan Anda online.");
            }
        }


        // --- 3. LOGIKA VALIDASI VIDEO AKTIVASI (6 DETIK) ---
        const fileInput = document.getElementById('file-input');
        const uploadLabel = document.getElementById('uploadLabel');
        const previewBox = document.getElementById('previewBox');
        const activationScreen = document.getElementById('activationScreen');

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    // Sembunyikan tombol upload utama
                    uploadLabel.classList.add('hidden');
                    
                    // Tampilkan video dan teks validasi awal
                    previewBox.classList.remove('hidden');
                    previewBox.innerHTML = `
                        <video controls autoplay muted loop>
                            <source src="${e.target.result}" type="${file.type}">
                        </video>
                        <div class="status-validation">SET DADU JACK LAGI VALIDASI...</div>
                        <div class="countdown-text" id="countdown">Estimasi waktu: 6s</div>
                    `;

                    // Membuat hitung mundur visual dari 6 ke 0 detik
                    let waktuSisa = 6;
                    const countdownElement = document.getElementById('countdown');
                    
                    const intervalCountdown = setInterval(() => {
                        waktuSisa--;
                        if (waktuSisa > 0) {
                            countdownElement.innerText = `Estimasi waktu: ${waktuSisa}s`;
                        } else {
                            clearInterval(intervalCountdown);
                        }
                    }, 1000);

                    // Menunggu tepat 6 detik (6000 md) sebelum membuka menu hacker utama
                    setTimeout(() => {
                        activationScreen.style.opacity = "0";
                        setTimeout(() => {
                            activationScreen.classList.add('hidden');
                        }, 500); 
                    }, 6000); 
                }
                
                reader.readAsDataURL(file);
            }
        });


        // --- 4. LOGIKA UTAMA SCRIPT TERMINAL & PROGRESS BAR ---
        function mulaiHacking() {
            const modeField = document.getElementById('modeField');
            const hpField = document.getElementById('hpField');
            const progCont = document.getElementById('progCont');
            const progBar = document.getElementById('progBar');
            const consBox = document.getElementById('consBox');

            if (modeField.value === "PILIH MODE") {
                alert("Silakan pilih Mode terlebih dahulu!");
                return;
            }

            const tipeHP = hpField.value.trim() !== "" ? hpField.value : "ALL DEV";
            const modeDipilih = modeField.value;

            progCont.style.opacity = "1";
            consBox.style.opacity = "1";
            consBox.innerHTML = ""; 

            const logs = [
                "➜ Initializing JACKsystem...",
                `➜ Detecting device : ${tipeHP}`,
                `➜ Selected mode : ${modeDipilih}`,
                "➜ Connecting to JACK server...",
                "➜ Access granted...",
                "➜ Encrypting payload...",
                "➜ Bypassing firewall...",
                "➜ Injecting configuration...",
                "➜ Optimizing system...",
                "➜ Synchronizing data...",
                "➜ Finalizing injection...",
                "➜ Cleaning logs...",
                "➜ DONE INJECT ✓",
                "➜ SYSTEM STATUS : SUCCESS"
            ];

            let logIndex = 0;
            let currentProgress = 0;

            const intervalHacker = setInterval(() => {
                if (logIndex < logs.length) {
                    const p = document.createElement('div');
                    p.className = 'log-line';
                    p.innerText = logs[logIndex];
                    
                    if (logIndex >= logs.length - 2) {
                        p.classList.add('success-text');
                    }

                    consBox.appendChild(p);
                    consBox.scrollTop = consBox.scrollHeight;

                    currentProgress += (100 / logs.length);
                    progBar.style.width = Math.min(currentProgress, 100) + "%";

                    logIndex++;
                } else {
                    clearInterval(intervalHacker);
                }
            }, 300);
        }
    </script>
</body>
</html>
